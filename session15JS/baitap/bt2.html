<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Todo Tết</title>
    <style>
      body {
        font-family: Arial;
        background: #f5f5f5;
        padding: 20px;
      }

      h1 {
        text-align: center;
        color: white;
        background: red;
        padding: 15px;
        border-radius: 10px;
      }

      ul {
        list-style: none;
        padding: 0;
      }

      li {
        background: #eee4c9;
        margin: 10px 0;
        padding: 15px;
        border-left: 5px solid orange;
        border-radius: 8px;
        display: flex;
        justify-content: space-between;
      }
      .done {
        text-decoration: line-through;
        color: gray;
        background: #d4edda;
        border-left: 5px solid green;
      }
    </style>
  </head>
  <body>
    <h1>Chuẩn bị Tết Nguyên Đán</h1>
    <ul id="todoList"></ul>

    <script src="./bt2.js"></script>
  </body>
</html>
